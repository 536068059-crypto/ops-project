version: "3.8"
networks:
  mynet:
    driver: bridge
volumes:
  mysql_data:
services:
  mysql:
    image: mysql:5.7
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: mydb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mynet
  redis:
    image: redis:6.2
    container_name: redis
    restart: always
    networks:
      - mynet
 
